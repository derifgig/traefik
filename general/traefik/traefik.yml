---
log:
  level: INFO
  format: json

# accesslog:
#   format: json
#   fields:
#     defaultMode: keep
#     headers:
#       defaultMode: keep

api:
  insecure: false
  dashboard: true
  debug: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https

  websecure:
    address: ":443"
    forwardedHeaders:
      trustedIPs:
        - 173.245.48.0/20
        - 103.21.244.0/22
        - 103.22.200.0/22
        - 103.31.4.0/22
        - 141.101.64.0/18
        - 108.162.192.0/18
        - 190.93.240.0/20
        - 188.114.96.0/20
        - 197.234.240.0/22
        - 198.41.128.0/17
        - 162.158.0.0/15
        - 104.16.0.0/13
        - 104.24.0.0/14
        - 172.64.0.0/13
        - 131.0.72.0/22
        - 2400:cb00::/32
        - 2606:4700::/32
        - 2803:f800::/32
        - 2405:b500::/32
        - 2405:8100::/32
        - 2a06:98c0::/29
        - 2c0f:f248::/32

providers:
  docker:
    exposedbydefault: false

  file:
    directory: "/etc/traefik/dynamic"
    watch: true

certificatesResolvers:
  #
  letsencrypt-http:
    acme:
      email: "user@domain.com"
      storage: "/certresolver/acme.json"
      httpChallenge:
        entryPoint: web

  # ACME resolver (Cloudflare DNS), Token in ENV variables
  letsencrypt-cf:
    acme:
      email: "user@domain.com"
      storage: "/certresolver/acme.json"
      dnschallenge:
        provider: cloudflare
        resolvers: "1.1.1.1:53,1.0.0.1:53"

experimental:
  plugins:
    cloudflarewarp:
      modulename: "github.com/pyksid/cloudflarewarp"
      version: "v1.3.4"
    fail2ban:
      moduleName: "github.com/tomMoulard/fail2ban"
      version: "v0.8.9"
