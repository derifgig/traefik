---
http:
  middlewares:
    ip-whitelist-localsources:
      ipAllowList:
        sourcerange: "10.0.0.0/8,192.168.0.0/16"

    redirect-www-to-non-www:
      redirectRegex:
        regex: "^https://www.(.*)"
        replacement: "https://${1}"
        permanent: true

    debug-headers:
      headers:
        customResponseHeaders:
          X-Debug-Real-IP: CF-Connecting-IP

    forward-real-ip:
      headers:
        customRequestHeaders:
          X-Real-IP: CF-Connecting-IP

    cloudflarewarp:
      plugin:
        cloudflarewarp:
          disabledefaultcfips: true
          trustip:
            - 173.245.48.0/20
            - 103.21.244.0/22
            - 103.22.200.0/22
            - 103.31.4.0/22
            - 141.101.64.0/18
            - 108.162.192.0/18
            - 190.93.240.0/20
            - 188.114.96.0/20
            - 197.234.240.0/22
            - 198.41.128.0/17
            - 162.158.0.0/15
            - 104.16.0.0/13
            - 104.24.0.0/14
            - 172.64.0.0/13
            - 131.0.72.0/22
            - 2400:cb00::/32
            - 2606:4700::/32
            - 2803:f800::/32
            - 2405:b500::/32
            - 2405:8100::/32
            - 2a06:98c0::/29
            - 2c0f:f248::/32

    limit-requests:
      rateLimit:
        average: 5
        burst: 20
        period: 1s

    f2b:
      plugin:
        fail2ban:
          allowlist:
            ip:
              - "127.0.0.1/32"
              - "192.168.0.0/16"
              - "172.16.0.0/12"
          rules:
            enabled: true
            bantime: "15m"
            findtime: "2m"
            maxretry: 5
            statuscode: "400,404,403,401"
